<!DOCTYPE html>
 <html>
    <head> 
			<meta charset="UTF-8">
			<title>Prototipo WebGIS per Backoffice Tecnico</title>
			<link rel="stylesheet" href="style.css">
			<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    </head>
    
    <body>
        <button id="togglePunti">Spegni punti</button>
		<div id="map"></div> 
        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.2/proj4.js"></script>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/proj4leaflet/1.0.2/proj4leaflet.js"></script>       
        <script type="module">
			// VISUALIZZO LA MAPPA
            import { MotoreMappa } from './MotoreMappa.js';
            const mappa = new MotoreMappa();
            mappa.iniziomappa();
			
			// SOSTITUISCO IL SETTIMEOUT CON IL PULSANTE
			let puntiVisibili = true;
			document.getElementById("togglePunti").addEventListener("click", () => {
				puntiVisibili = !puntiVisibili;

				mappa.toggleLayer("punti", puntiVisibili);

				document.getElementById("togglePunti").textContent =
					puntiVisibili ? "Spegni punti" : "Accendi punti";
			});
        </script>
    </body>
</html>
